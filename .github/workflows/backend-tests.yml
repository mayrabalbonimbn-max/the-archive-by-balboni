name: Backend tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: archive_test
          POSTGRES_PASSWORD: archive_test
          POSTGRES_DB: archive_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://archive_test:archive_test@localhost:5432/archive_test
      DATABASE_SSL: "false"
      JWT_SECRET: ci-test-secret-change-in-production-only
      SIGNUP_MODE: open
      VAPID_PUBLIC_KEY: ""
      VAPID_PRIVATE_KEY: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Wait for Postgres
        run: |
          for i in {1..20}; do
            node -e "const { Client } = require('pg'); const c = new Client({ connectionString: process.env.DATABASE_URL }); c.connect().then(() => c.end()).then(() => process.exit(0)).catch(() => process.exit(1))" && exit 0
            sleep 1
          done
          exit 1

      - name: Prepare test database
        run: node -e "require('./src/db').initialize().then(() => process.exit(0)).catch(err => { console.error(err); process.exit(1) })"

      - name: Run backend tests
        run: npm test
