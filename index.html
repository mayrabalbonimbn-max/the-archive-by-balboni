<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="The Archive by Balboni — arquivo pessoal de ideias, estudos e memória" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="The Archive" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..600&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <title>The Archive by Balboni</title>
  </head>
  <body>
    <div id="root"></div>

    <!-- Catch stale-asset / MIME errors before React mounts -->
    <script>
      window.__archiveClearAndReload = async function() {
        try {
          if ('serviceWorker' in navigator) {
            var regs = await navigator.serviceWorker.getRegistrations()
            await Promise.all(regs.map(function(r) { return r.unregister() }))
          }
          if ('caches' in window) {
            var keys = await caches.keys()
            await Promise.all(keys.map(function(k) { return caches.delete(k) }))
          }
        } catch(e) {}
        window.location.reload(true)
      }

      window.addEventListener('error', function(e) {
        var msg = e.message || ''
        var isStale = msg.indexOf('MIME type') !== -1
          || msg.indexOf('Failed to fetch dynamically') !== -1
          || msg.indexOf('Importing a module script failed') !== -1
        if (!isStale) return
        // Only show recovery UI if React hasn't mounted yet
        var root = document.getElementById('root')
        if (root && root.childElementCount > 0) return
        root.innerHTML = [
          '<div style="min-height:100dvh;background:#000;color:#f2ede6;display:flex;flex-direction:column;',
          'align-items:center;justify-content:center;padding:32px 24px;text-align:center;font-family:system-ui,sans-serif">',
          '<div style="font-size:32px;margin-bottom:20px;opacity:.4">⟳</div>',
          '<h2 style="margin:0 0 10px;font-family:Georgia,serif;font-style:italic;font-weight:400;font-size:22px;color:#f2ede6">',
          'Nova versão disponível</h2>',
          '<p style="margin:0 0 28px;font-size:14px;color:#aba49a;line-height:1.6;max-width:300px">',
          'O app foi atualizado. Clique abaixo para carregar a versão mais recente.</p>',
          '<button onclick="window.__archiveClearAndReload()" ',
          'style="padding:13px 28px;border-radius:12px;border:none;background:#e86cb4;',
          'color:#fff;cursor:pointer;font-size:15px;font-weight:600">Atualizar app</button>',
          '</div>'
        ].join('')
      })
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
